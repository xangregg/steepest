<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steepest Road in Town</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <h1>Steepest road in town</h1>
    <form id="controls">
        <label>Place
            <input id="place" type="text" placeholder="Town or “lat, lon”" size="22" required
                   title="A town/city name (e.g. Pittsburgh, PA) or coordinates like 40.44, -79.99">
        </label>
        <label>Radius
            <input id="radius" type="number" min="1" max="15" step="0.5" value="10"> km
        </label>
        <label>Rank by
            <select id="rankmode" title="Steepest sustained: best average grade over a stretch of the chosen length. Hardest climb: gain × grade of the road's biggest continuous climb (dips end a climb).">
                <option value="climb" selected>Hardest climb</option>
                <option value="sustained">Steepest sustained</option>
            </select>
        </label>
        <label>Sustained length
            <input id="window" type="number" min="25" max="2000" step="25" value="250"
                   title="Steepness = best average grade held over any stretch of this length. 25 m ≈ steepest single segment; larger values reward long climbs."> m
        </label>
        <label>Min length
            <input id="minlen" type="number" min="50" max="5000" step="50" value="250"> m
        </label>
        <button id="go" type="submit">Find steep roads</button>
    </form>
    <div id="status" role="status" aria-live="polite"></div>
</header>
<main>
    <div id="map"></div>
    <aside id="sidebar">
        <h2 id="list-title">Steepest roads</h2>
        <p id="list-sub"></p>
        <div id="road-list"></div>
        <p class="fine-print">Road data © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
            via Overpass API. Elevation from <a href="https://registry.opendata.aws/terrain-tiles/">AWS Terrain Tiles</a>
            (≈10–30 m resolution — short-segment grades are approximate; bridge and tunnel elevations are interpolated between their ends).</p>
    </aside>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script type="module" src="app.js"></script>
</body>
</html>
