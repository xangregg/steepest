<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Steepest Road in Town</title>
    <!-- Privacy-friendly analytics; data-domain must match the site name in Plausible exactly. -->
    <script defer data-domain="xangregg.github.io" src="https://plausible.io/js/script.js"></script>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<main>
    <section id="map-panel">
        <div id="map-controls">
            <div class="title-row">
                <h1>Steepest road in town</h1>
                <a class="repo-link" href="https://github.com/xangregg/steepest">Source on GitHub</a>
            </div>
            <form id="controls">
                <label>Place
                    <input id="place" type="text" placeholder="Town or “lat, lon”" size="22" required
                           title="A town/city name (e.g. Pittsburgh, PA) or coordinates like 40.44, -79.99">
                </label>
                <label>Radius
                    <input id="radius" type="number" min="1" max="15" step="0.5" value="6"> km
                </label>
                <button id="go" type="submit">Find steep roads</button>
            </form>
            <div id="status" role="status" aria-live="polite"></div>
            <div id="progress"><div id="progress-fill"></div></div>
        </div>
        <div id="map"></div>
    </section>
    <aside id="rank-panel">
        <div id="rank-controls">
            <div class="ctrl-row">
                <label>Rank by
                    <select id="rankmode" title="Steepest: best average grade over a stretch of the chosen length. Hardest climb: gain × grade of the road's biggest continuous climb (dips end a climb). Longest incline: the road's longest mostly-monotonic incline (the amber underlay).">
                        <option value="sustained" selected>Steepest</option>
                        <option value="climb">Hardest climb</option>
                        <option value="incline">Longest incline</option>
                    </select>
                </label>
                <label>Top
                    <input id="listmax" type="number" min="5" max="100" step="5" value="15"
                           title="How many roads appear in the ranked list — and, in climb mode, how many climbs wear red on the map.">
                </label>
            </div>
            <label>Sustained length
                <input id="window" type="number" min="25" max="2000" step="25" value="250"
                       title="Steepness = best average grade held over any stretch of this length. 25 m ≈ steepest single segment; larger values reward long climbs."> m
            </label>
            <label>Long incline
                <input id="longlen" type="number" min="200" max="5000" step="50" value="800"
                       title="Mostly monotonic stretches at least this long, averaging ≥2.25%, get the amber long-incline underlay."> m
                <span class="inline-knob">over
                    <input id="inclineroads" type="number" min="1" max="5" step="1" value="1"
                           title="Longest-incline mode only: how many connected roads one incline may span. 1 keeps each incline on a single named road; higher lets it continue across junctions onto adjoining roads.">
                    road(s)</span>
            </label>
        </div>
        <div id="rank-list-area">
            <div class="list-head">
                <h2 id="list-title">Steepest roads</h2>
                <button id="download" type="button" hidden title="Download the ranked list as CSV">↓ CSV</button>
            </div>
            <p id="list-sub"></p>
            <div id="road-list"></div>
            <p class="fine-print">Road data © <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors
                via Overpass API. Elevation from <a href="https://registry.opendata.aws/terrain-tiles/">AWS Terrain Tiles</a>
                (≈10–30 m resolution — short-segment grades are approximate; bridge and tunnel elevations are interpolated between their ends).</p>
        </div>
    </aside>
</main>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script type="module" src="app.js"></script>
</body>
</html>
